apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: heart-app

  template:
    metadata:
      labels:
        app: heart-app

    spec:
      containers:
      - name: heart-app
        image: heart-app
        ports:
        - containerPort: 8501