apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-disease-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: heart-app
  template:
    metadata:
      labels:
        app: heart-app
    spec:
      containers:
      - name: heart-app
        image: YOUR_DOCKERHUB_USERNAME/heart-disease-app:latest
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: heart-app-service
spec:
  type: NodePort
  selector:
    app: heart-app
  ports:
  - port: 80
    targetPort: 8501
    nodePort: 30007